name: Check Upstream Updates

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check upstream latest commit date
        id: upstream
        run: |
          UPSTREAM_DATE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/kukapay/crypto-skills/commits?per_page=1 | \
            jq -r '.[0].commit.committer.date')
          echo "date=$UPSTREAM_DATE" >> $GITHUB_OUTPUT

      - name: Create branch and PR if upstream updated
        id: create_pr
        env:
          UPSTREAM_DATE: ${{ steps.upstream.outputs.date }}
        run: |
          LAST_CHECK_FILE=".last-upstream-check"
          if [ -f "$LAST_CHECK_FILE" ]; then
            LAST_CHECK=$(cat "$LAST_CHECK_FILE")
          else
            LAST_CHECK="2025-01-01T00:00:00Z"
          fi

          if [[ "$UPSTREAM_DATE" > "$LAST_CHECK" ]]; then
            BRANCH_NAME="chore/upstream-update-$(date +%Y%m%d)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git checkout -b "$BRANCH_NAME"

            echo "$UPSTREAM_DATE" > "$LAST_CHECK_FILE"
            git add "$LAST_CHECK_FILE"
            git commit -m "chore: record upstream update check ($UPSTREAM_DATE)"

            git push origin "$BRANCH_NAME"

            echo "create_pr=true" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "create_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.create_pr.outputs.create_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: sync with upstream cryptoskills.dev updates',
              head: '${{ steps.create_pr.outputs.branch }}',
              base: 'main',
              body: `## 上游更新检测

原项目 https://github.com/kukapay/crypto-skills 检测到新更新。

**建议操作**：
1. 查看上游最新变更：https://github.com/kukapay/crypto-skills/compare/main...HEAD
2. 根据变更内容更新本仓库的 \`cryptoskills/SKILL.md\`
3. 更新 README.md 中的相关说明（如有必要）
4. 合并此 PR 后，meta-skill 将保持与上游同步

---

**自动创建于**：${new Date().toISOString()}
**上游最新提交时间**：${{ steps.upstream.outputs.date }}`
            });
            console.log('Created PR:', pr.html_url);