name: Check Upstream Updates

on:
  schedule:
    # Every Monday and Thursday at 09:00 UTC
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check multiple upstreams
        id: check
        run: |
          declare -A UPSTREAMS
          UPSTREAMS["cryptoskills.dev"]="kukapay/crypto-skills"
          UPSTREAMS["Binance"]="binance/binance-skills-hub"
          UPSTREAMS["OKX"]="okx/agent-skills"
          UPSTREAMS["Gate"]="gate/gate-skills"
          UPSTREAMS["Bybit"]="bybit-exchange/skills"
          UPSTREAMS["Bitget"]="Bitget-AI/agent_hub"
          UPSTREAMS["Uniswap"]="Uniswap/uniswap-ai"
          UPSTREAMS["PancakeSwap"]="pancakeswap/pancakeswap-ai"
          UPSTREAMS["GMGN"]="GMGNAI/gmgn-skills"
          UPSTREAMS["OpenNews MCP"]="6551Team/opennews-mcp"

          UPDATED=""
          for name in "${!UPSTREAMS[@]}"; do
            REPO=${UPSTREAMS[$name]}
            LATEST=$(curl -s "https://api.github.com/repos/$REPO/commits?per_page=1" | jq -r '.[0].commit.committer.date // empty')
            if [ -n "$LATEST" ]; then
              echo "$name latest: $LATEST"
              # Simple check: if we have a previous record and it's newer
              PREV_FILE=".last-check-$name"
              if [ -f "$PREV_FILE" ]; then
                PREV=$(cat "$PREV_FILE")
                if [[ "$LATEST" > "$PREV" ]]; then
                  UPDATED+="$name ($LATEST) "
                fi
              fi
              echo "$LATEST" > "$PREV_FILE"
            fi
          done

          if [ -n "$UPDATED" ]; then
            echo "updated_repos=$UPDATED" >> $GITHUB_OUTPUT
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and PR if updates found
        if: steps.check.outputs.has_update == 'true'
        run: |
          BRANCH="chore/upstream-sync-$(date +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .last-check-*
          git commit -m "chore: sync upstream updates" || true
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.has_update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const updated = '${{ steps.check.outputs.updated_repos }}';
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: sync with upstream updates',
              head: '${{ steps.create_pr.outputs.branch || github.ref }}',
              base: 'main',
              body: `## 上游更新检测

以下上游项目检测到新更新：

${updated}

**建议操作**：
1. 检查各上游最新变更
2. 更新相应 Skills 内容
3. 测试示例是否仍有效

---

**自动创建于**：${new Date().toISOString()}`
            });